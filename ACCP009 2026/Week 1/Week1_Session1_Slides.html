# Returns (versus Prices)

---

# Why Focus on Returns?

We will focus on describing and analysing the **returns** on financial assets

Although financial analysts often observe prices on their screens such as stock prices, commodity prices, bond prices and exchange rates, the main objective of financial econometrics is to analyze financial returns (mostly)

**Reasons:**

- For an average investor, returns are a **complete and scale free summary** of the investment opportunity
- As they are scale free, returns can be **easily compared across assets**. For instance, you could compare the annual return of an investment in stocks with an investment in a bond
- In contrast to prices, returns tend to be **stationary** (more on this later), i.e. are statistically more attractive and easier to model

---

# Why Focus on Returns?

There are, however, several ways to compute returns

**Key question for today:**

- What are the different ways to calculate returns?
- When should we use each type?
- How do they differ in practice?


---

# One-period Simple Returns

Let `\(P_t\)` be a price of an asset. The simple **gross** return is defined by
`$$1 + R_t = \frac{P_t}{P_{t-1}}$$`
`\(\frac{P_t}{P_{t-1}}\)` is also called a price ratio or relative price.

The corresponding simple **net** return is
`$$R_t = \frac{P_t}{P_{t-1}}-1$$`

Net returns are frequently multiplied by 100 to be in percentage points. (Always be clear about this!)

**Note**: In this course, we work with decimal returns (e.g., 0.01 for 1%) unless stated otherwise.

---

# Multiperiod Returns

The gross return over the most recent k periods is then given by
`$$1 + R_t(k) = \prod_{j=0}^{k-1} (1 + R_{t-j}) = \frac{P_t}{P_{t-k}}$$`
Likewise, the simple return is
`$$R_t(k) = \frac{P_t}{P_{t-k}}-1$$`
This is often called compound return. (Note, that it is not 'just' the sum of the one-period simple returns.)

It is important to define returns always with respect to a certain time interval. E.g., a statement such as 'the investment achieved a return of 20%' is meaningless unless we specify the horizon in which this return has been achieved.

---

# Continuously Compounded Returns

A geometric average (of returns) is not very convenient to handle. Another type of return, which is approximate but easier to work with, is the **log-return**
`$$r_t = \ln (1 + R_t ) = \ln \frac{P_t}{P_{t-1}} = p_t - p_{t-1}$$`
with `\(p_t = \ln P_t\)`.

For `\(R_t\)` small, `\(r_t \approx R_t\)` by a first order Taylor approximation to `\(\ln (1 + x)\)`.

**Intuition**: Log returns represent continuously compounded returns.

---

# Example: Continuous Compounding

There is an account paying `\(m\)` times a year an interest of 10% on a notional of 1 EUR.

| Type | # of payments | Rate in period | capital (EUR) |
|------|---------------|----------------|---------------|
| annually | 1 | 0.1 | 1.1000 |
| semiannually | 2 | 0.05 | 1.1025 |
| quarterly | 4 | 0.025 | 1.1038 |
| | `\(m\)` | `\(0.1/m\)` | `\((1 + 0.1/m)^m\)` |
| continuously | `\(\infty\)` | | `\(e^{0.1} \approx 1.1052\)` |

because `\(\lim_{m\rightarrow \infty}(1 + x/m)^m = \exp(x)\)`. Continuous compounding means that the interest is accrued instantaneously.

---

]

---

# Advantages of Log Returns

- **Time additivity:**
`$$r_t(k) = \ln[1 + R_t(k)] = r_t + r_{t-1} + \ldots + r_{t-k+1}$$`
The continuously compounded multiperiod return is simply the sum of continuously compounded one-period returns involved.

- The frequency of compounding does not matter and makes returns across assets more easily comparable.

- The statistical properties of log returns are more tractable as opposed to simple returns; it is far easier to derive the time-series properties of additive processes than of multiplicative processes.

- Log returns can take any value on the real line `\(\mathbb{R}\)`, whereas simple returns are limited from below. Log returns are therefore logically consistent with a normal distribution, while simple returns are not.

---

# Annualization

In the press (and economic interpretations of results), a yearly horizon of the investment returns is often used for comparison purposes. Returns can be annualized by
`$$\text{Annualized }R_t(k) = \left\{ \prod_{j=0}^{k-1} (1 + R_{t-j} ) \right\}^{f/k} -1$$`
where `\(f\)` is the frequency of the data, i.e., `\(f = \{1, 4, 12, \ldots\}\)` for yearly, quarterly, monthly data, ....

For `\(f = 1\)` this is a geometric mean of k one-period simple gross returns.

For log-returns, we get:
`$$\text{Annualized }r_t(k) = \frac{f}{k} \sum_{j=0}^{k-1} r_{t-j}$$`
where again `\(f\)` is the frequency of the data. So here, we get an arithmetic mean.

**For daily data**: `\(f = 252\)` (number of trading days per year)

---

# Portfolio Returns

A simple net return of a portfolio is a weighted average of simple net returns of the assets involved. Let `\(w_i\)` be a percentage of the portfolio's value invested in asset `\(i = 1, \ldots, n\)`. Then
`$$R_{p,t} = \sum_{i=1}^n w_i R_{i,t}$$`
but
`$$r_{p,t} = \ln (1 + R_{p,t} ) = \ln \left(1 + \sum_{i=1}^n w_i R_{i,t} \right) \neq \sum_{i=1}^n w_i r_{i,t}$$`

Nevertheless you often see `\(r_{p,t} \approx \sum_{i=1}^n w_i r_{i,t}\)` ... !

---

# Simple Returns versus Continuously Compounded Returns

Often you can work interchangeably with both but note:

- `\(r_t \leq R_t\)`
- Check: is it fit for purpose?
  E.g., the standard Markowitz `\((\mu, \sigma)\)` optimization is not defined for log-returns ... (without additional constraints)
- Check: is your choice of exact or only of approximative nature!

**In this course**: We will primarily use **log returns** for their statistical properties.

---

# Treatment of Dividends

In the presence of dividends `\(D_t\)` the definitions of simple and log returns need to be modified to
`$$R_t = \frac{P_t^{ex} + D_t}{P_{t-1}} -1
\text{ and }
r_t = \ln (P_t^{ex} + D_t) - \ln (P_{t-1})$$`
where `\(P_t^{ex}\)` is taken to be the ex-dividend price of the stock.

- Multiperiod returns are obtained accordingly.
- Need to be careful about the assumption if dividends are cashed out or re-invested!

Similarly, adjustments for splits, bonus shares etc might be needed!

**Solution in practice**: Use **adjusted close prices** from data providers (Yahoo Finance, Bloomberg, etc.) which already account for dividends, splits, and other corporate actions.


---
